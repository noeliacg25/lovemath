<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problemas de Tiempo Ampliados - MatesEnRuta</title>
    <style>
        :root {
            --bg-color: #fff7ed;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #475569;
            --primary: #ea580c;
            --secondary: #f97316;
            --correct: #10b981;
            --incorrect: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.4;
        }

        .header-nav {
            background-color: var(--card-bg);
            padding: 12px 15px;
            border-bottom: 1px solid #fed7aa;
            margin-bottom: 20px;
        }

        .btn-back {
            font-size: 10pt;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .hero-banner {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #ffffff;
            padding: 25px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
        }

        .hero-banner h1 { font-size: 18pt; margin-bottom: 6px; }
        .hero-banner p { font-size: 10.5pt; opacity: 0.9; }

        .activity-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 22px;
            border: 2px solid #fed7aa;
            max-width: 800px;
            margin: 0 auto 30px auto;
        }

        .activity-card h3 {
            font-size: 13pt;
            color: var(--primary);
            margin-bottom: 15px;
            border-bottom: 2px dashed #fed7aa;
            padding-bottom: 8px;
        }

        .problem-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .problem-block {
            background-color: #fffbf7;
            border: 1px solid #ffedd5;
            border-radius: 8px;
            padding: 15px;
        }

        .problem-text {
            font-size: 10.5pt;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .problem-context {
            font-style: italic;
            color: var(--text-muted);
            font-size: 9.5pt;
            margin-bottom: 8px;
            display: block;
        }

        .input-row {
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
